<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login/SignUp Form</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container">
        <div class="form-box">
            <header>
                <h1 id = "title">Login</h1>
            </header>
            <form action="">
                <input type="text" placeholder="Name" name="" id="nameField">
                <input type="email" placeholder="Username or Email Address" name="" id="">
                <input type="password" placeholder="Password" name="" id="">
                <a href="">Forgot Password</a>
                <input type="button" value="Login" id="signinBtn">
                
                <div class="links">
                    <a href="#"><img src="fb.jpg" alt=""></a>
                    <a href="#"><img src="google.png" alt=""></a>
                    <a href="#"><img src="twitter.png" alt=""></a>
                </div>
                <p class="signup">Not a member?<a href="" id="signupBtn"> SignUp</a></p>
            </form>
        </div>
        <a href="/index.html"><button class="back-btn">Back</button></a>
    </div>
    <script src="script.js"></script>
</body>
</html>
